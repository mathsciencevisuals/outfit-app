substitutions:
  _REGION: europe-west4
  _AR_REPOSITORY: outfit-app
  _SERVICE_NAME: fitme-api
  _IMAGE_NAME: api
  _PLATFORM: managed
  _SERVICE_ACCOUNT: fitme-api-runner@${PROJECT_ID}.iam.gserviceaccount.com
  _CLOUDSQL_INSTANCE: ""
  _VPC_NETWORK: default
  _VPC_SUBNET: default
  _REDIS_URL: redis://10.0.0.3:6379
  _STORAGE_PROVIDER: cloudinary
  _CLOUDINARY_FOLDER: fitme
  _TRYON_PROVIDER: mock

steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -f
      - apps/api/Dockerfile
      - -t
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPOSITORY}/${_IMAGE_NAME}:${COMMIT_SHA}
      - .
  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPOSITORY}/${_IMAGE_NAME}:${COMMIT_SHA}
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE_NAME}
      - --platform=${_PLATFORM}
      - --region=${_REGION}
      - --image=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPOSITORY}/${_IMAGE_NAME}:${COMMIT_SHA}
      - --service-account=${_SERVICE_ACCOUNT}
      - --allow-unauthenticated
      - --port=3001
      - --cpu=1
      - --memory=1Gi
      - --min-instances=0
      - --max-instances=10
      - --add-cloudsql-instances=${_CLOUDSQL_INSTANCE}
      - --network=${_VPC_NETWORK}
      - --subnet=${_VPC_SUBNET}
      - --vpc-egress=private-ranges-only
      - --set-env-vars=NODE_ENV=production,STORAGE_PROVIDER=${_STORAGE_PROVIDER},CLOUDINARY_FOLDER=${_CLOUDINARY_FOLDER},REDIS_URL=${_REDIS_URL},TRYON_PROVIDER=${_TRYON_PROVIDER}
      - --update-secrets=DATABASE_URL=fitme-database-url:latest,JWT_SECRET=fitme-jwt-secret:latest,CLOUDINARY_CLOUD_NAME=fitme-cloudinary-cloud-name:latest,CLOUDINARY_API_KEY=fitme-cloudinary-api-key:latest,CLOUDINARY_API_SECRET=fitme-cloudinary-api-secret:latest

images:
  - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPOSITORY}/${_IMAGE_NAME}:${COMMIT_SHA}
