version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: fitme-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: fitme
      POSTGRES_USER: fitme
      POSTGRES_PASSWORD: fitme
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: fitme-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  minio:
    image: minio/minio:RELEASE.2024-08-17T01-24-54Z
    container_name: fitme-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

volumes:
  postgres_data:
  redis_data:
  minio_data:
